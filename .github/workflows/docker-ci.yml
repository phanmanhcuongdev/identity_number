name: Docker CI to GHCR

on:
  push:
    branches:
      - master # Đã sửa từ main thành master cho khớp với repo của sếp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Cấp quyền để Actions có thể đẩy image vào GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Dùng token tự động của GitHub, không cần tạo Secret thủ công

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Lưu ý: Tên image trên GHCR phải viết THƯỜNG (lowercase)
          tags: |
            ghcr.io/${{ github.repository_owner }}/identity_number:latest
            ghcr.io/${{ github.repository_owner }}/identity_number:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max