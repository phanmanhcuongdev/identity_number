<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MNIST Digit Recognizer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(92vw, 520px);
      display: grid;
      gap: 18px;
      justify-items: center;
      padding: 28px;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    canvas {
      width: min(300px, 100%);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      background: #ffffff;
      border: 2px solid #334e68;
      border-radius: 8px;
      touch-action: none;
      cursor: crosshair;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      min-width: 112px;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: #2563eb;
    }

    button.secondary {
      background: #52606d;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .result {
      min-height: 70px;
      display: grid;
      gap: 6px;
      justify-items: center;
      text-align: center;
    }

    .digit {
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }

    .confidence {
      color: #52606d;
      font-size: 15px;
    }

    .error {
      color: #b42318;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Nhận diện chữ số viết tay</h1>

    <canvas id="drawCanvas" width="300" height="300" aria-label="Bảng vẽ chữ số"></canvas>

    <div class="controls">
      <button class="secondary" id="clearBtn" type="button">Clear</button>
      <button id="predictBtn" type="button">Predict</button>
    </div>

    <section class="result" aria-live="polite">
      <div id="prediction" class="digit">-</div>
      <div id="confidence" class="confidence">Vẽ một chữ số rồi bấm Predict</div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
